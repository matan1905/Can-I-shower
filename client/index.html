<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>אפשר להתקלח?</title>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            color: #e2e8f0;
            line-height: 1.6;
            overflow-x: hidden;
        }
        .bg-blobs { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
        .bg-blobs span { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.15; animation: float 20s ease-in-out infinite alternate; }
        .bg-blobs .b1 { width: 500px; height: 500px; background: #6366f1; top: -10%; left: -10%; }
        .bg-blobs .b2 { width: 400px; height: 400px; background: #3b82f6; bottom: -10%; right: -10%; animation-delay: -7s; }
        .bg-blobs .b3 { width: 300px; height: 300px; background: #8b5cf6; top: 50%; left: 50%; animation-delay: -14s; }
        @keyframes float { 0% { transform: translate(0,0) scale(1); } 100% { transform: translate(40px,-30px) scale(1.1); } }
        .app { position: relative; z-index: 1; max-width: 640px; margin: 0 auto; padding: 1.5rem 1rem 2rem; }
        .glass { background: rgba(255,255,255,0.06); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; }
        /* Debug panel */
        .debug-float { position: fixed; top: 1rem; right: 1rem; z-index: 100; background: rgba(15,12,41,0.95); backdrop-filter: blur(12px); border: 1px solid rgba(99,102,241,0.4); border-radius: 12px; padding: 0.85rem 1rem; font-size: 0.8rem; display: flex; flex-direction: column; gap: 0.5rem; min-width: 220px; }
        [dir="rtl"] .debug-float { right: auto; left: 1rem; }
        .debug-float label { color: #94a3b8; font-weight: 600; }
        .debug-float input[type="datetime-local"] { padding: 0.4rem 0.5rem; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.08); color: #e2e8f0; font-size: 0.85rem; }
        .debug-float input[type="datetime-local"]::-webkit-calendar-picker-indicator { filter: invert(1); }
        .debug-float input[type="datetime-local"]:focus { outline: none; border-color: rgba(99,102,241,0.6); }
        .debug-float .debug-actions { display: flex; gap: 0.4rem; }
        .debug-float button { padding: 0.35rem 0.65rem; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.08); color: #e2e8f0; cursor: pointer; font-size: 0.8rem; }
        .debug-float button:hover { background: rgba(255,255,255,0.14); }
        .debug-float button.primary { background: rgba(99,102,241,0.4); border-color: rgba(99,102,241,0.5); }
        /* Header */
        header { text-align: center; margin-bottom: 2rem; position: relative; }
        .lang-toggle { position: absolute; top: 0; left: 0; display: flex; border-radius: 999px; overflow: hidden; border: 1px solid rgba(255,255,255,0.15); font-size: 0.75rem; }
        [dir="ltr"] .lang-toggle { left: auto; right: 0; }
        .lang-toggle button { padding: 0.3rem 0.65rem; border: none; cursor: pointer; background: transparent; color: #94a3b8; font-weight: 600; transition: all 0.2s; }
        .lang-toggle button.active { background: rgba(99,102,241,0.5); color: #fff; }
        h1 { font-size: clamp(1.8rem, 5vw, 2.5rem); font-weight: 800; margin-bottom: 0.25rem; }
        .subtitle { font-size: 0.9rem; color: #94a3b8; margin-bottom: 0.5rem; }
        .status { display: inline-flex; align-items: center; gap: 0.35rem; font-size: 0.75rem; color: #94a3b8; }
        .status-dot { width: 7px; height: 7px; border-radius: 50%; background: #ef4444; transition: background 0.3s; }
        .status-dot.ok { background: #22c55e; animation: pulse-dot 2s ease-in-out infinite; }
        @keyframes pulse-dot { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
        /* Risk gauge */
        .risk-section { display: flex; flex-direction: column; align-items: center; margin-bottom: 2rem; }
        .risk-gauge { position: relative; width: 260px; height: 150px; direction: ltr; }
        @media (min-width:600px) { .risk-gauge { width: 300px; height: 170px; } }
        .risk-gauge svg { width: 100%; height: 100%; display: block; }
        .gauge-text { position: absolute; bottom: 4px; left: 0; right: 0; display: flex; flex-direction: column; align-items: center; pointer-events: none; }
        .risk-percent { font-size: clamp(2.5rem, 10vw, 3.5rem); font-weight: 800; color: #fff; line-height: 1; }
        .risk-sublabel { font-size: 0.85rem; font-weight: 600; color: rgba(255,255,255,0.85); margin-top: 0.2rem; }
        .risk-rec { font-size: 1.95rem; color: #cbd5e1; text-align: center; margin-top: 0.75rem; max-width: 800px; }
        .viewer-line { margin-top: 0.4rem; font-size: 0.9rem; color: #a5b4fc; text-align: center; }
        .loc-cta { margin-top: 1rem; padding: 0.65rem 1.4rem; border-radius: 999px; border: 1px solid rgba(129,140,248,0.9); background: radial-gradient(circle at 0 0, rgba(129,140,248,0.45), rgba(56,189,248,0.18)); color: #e0e7ff; font-size: 0.9rem; font-weight: 700; cursor: pointer; display: inline-flex; align-items: center; gap: 0.5rem; box-shadow: 0 10px 26px rgba(15,23,42,0.9); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); transition: transform 0.15s ease, box-shadow 0.15s ease; }
        .loc-cta:hover { transform: translateY(-2px); box-shadow: 0 14px 32px rgba(15,23,42,1); }
        /* Controls */
        .controls-card { padding: 1.25rem; margin-bottom: 1.5rem; position: relative; z-index: 10; display: flex; flex-direction: column; gap: 1.25rem; }
        .control-label { font-size: 0.75rem; color: #94a3b8; margin-bottom: 0.5rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
        .duration-row { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; }
        .dur-pill { padding: 0.45rem 1rem; border-radius: 999px; border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.05); color: #e2e8f0; font-size: 0.85rem; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
        .dur-pill:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.2); }
        .dur-pill.active { background: rgba(99,102,241,0.45); border-color: rgba(99,102,241,0.6); color: #fff; }
        .dur-custom { width: 60px; padding: 0.45rem 0.5rem; border-radius: 999px; border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.05); color: #e2e8f0; font-size: 0.85rem; text-align: center; transition: border-color 0.2s; -moz-appearance: textfield; }
        .dur-custom::-webkit-outer-spin-button, .dur-custom::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .dur-custom::placeholder { color: #64748b; }
        .dur-custom:focus { outline: none; border-color: rgba(99,102,241,0.6); }
        .loc-input-wrap { position: relative; }
        .loc-input { width: 100%; padding: 0.7rem 1rem; border-radius: 12px; border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.05); color: #e2e8f0; font-size: 0.95rem; transition: border-color 0.2s; }
        .loc-input::placeholder { color: #64748b; }
        .loc-input:focus { outline: none; border-color: rgba(99,102,241,0.6); }
        .ac-dropdown { position: absolute; top: 100%; right: 0; left: 0; margin-top: 0.3rem; border-radius: 12px; max-height: 200px; overflow-y: auto; z-index: 20; background: rgba(30,25,60,0.95); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.12); box-shadow: 0 12px 24px rgba(0,0,0,0.4); }
        .ac-item { padding: 0.6rem 1rem; cursor: pointer; transition: background 0.15s; font-size: 0.9rem; }
        .ac-item:hover { background: rgba(255,255,255,0.08); }
        .ac-item:first-child { border-radius: 12px 12px 0 0; }
        .ac-item:last-child { border-radius: 0 0 12px 12px; }
        .chips { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-top: 0.6rem; }
        .chip { display: inline-flex; align-items: center; gap: 0.4rem; padding: 0.3rem 0.7rem; border-radius: 999px; background: rgba(99,102,241,0.25); border: 1px solid rgba(99,102,241,0.35); font-size: 0.8rem; color: #c7d2fe; }
        .chip button { background: none; border: none; color: #94a3b8; cursor: pointer; font-size: 1rem; line-height: 1; padding: 0 0.15rem; transition: color 0.15s; }
        .chip button:hover { color: #ef4444; }
        /* Info cards */
        .cards-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.75rem; margin-bottom: 2rem; }
        @media (max-width:600px) { .cards-grid { grid-template-columns: 1fr 1fr; } }
        .info-card { padding: 0.85rem; }
        .info-card-title { font-size: 0.7rem; color: #94a3b8; margin-bottom: 0.3rem; }
        .info-card-value { font-size: 1rem; font-weight: 600; }
        .trend-up { color: #f87171; }
        .trend-down { color: #4ade80; }
        .trend-stable { color: #94a3b8; }
        /* Daily graph */
        .daily-graph-section { padding: 1.25rem; margin-bottom: 2rem; }
        .daily-graph-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; flex-wrap: wrap; gap: 0.5rem; }
        .daily-graph-title { font-size: 0.75rem; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.04em; }
        .best-time-badge { font-size: 0.8rem; font-weight: 700; color: #4ade80; background: rgba(74,222,128,0.1); border: 1px solid rgba(74,222,128,0.25); border-radius: 999px; padding: 0.25rem 0.75rem; }
        .zoom-reset-btn { width: 28px; height: 28px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.08); color: #94a3b8; font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.15s; }
        .zoom-reset-btn:hover { background: rgba(255,255,255,0.15); color: #e2e8f0; }
        .daily-graph-loading { text-align: center; color: #64748b; padding: 2rem; font-size: 0.85rem; }
        /* Reasonings */
        .reasonings-section { margin-top: 0.5rem; margin-bottom: 2rem; }
        .reasonings-header { display: flex; justify-content: space-between; align-items: baseline; font-size: 0.75rem; color: #94a3b8; margin-bottom: 1.5rem; }
        .reasonings-title { font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; }
        #riskChart { min-height: 340px; }
        /* Tooltip */
        .apexcharts-tooltip { background: transparent !important; border: none !important; box-shadow: none !important; overflow: visible !important; }
        .custom-tooltip { background: rgba(15,23,42,0.95); backdrop-filter: blur(12px); border: 1px solid rgba(148,163,184,0.4); border-radius: 12px; padding: 0.85rem; color: #e2e8f0; min-width: 220px; max-width: 260px; box-shadow: 0 16px 40px rgba(15,23,42,0.9); font-size: 0.8rem; }
        .custom-tooltip .ct-header { font-weight: 700; color: #fff; margin-bottom: 0.4rem; font-size: 0.85rem; padding-bottom: 0.3rem; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .custom-tooltip .ct-desc { font-size: 0.75rem; color: #cbd5e1; margin-bottom: 0.8rem; white-space: normal !important; line-height: 1.4; }
        .custom-tooltip .ct-metrics { display: flex; flex-direction: column; gap: 0.25rem; }
        .custom-tooltip .ct-metric { display: flex; justify-content: space-between; gap: 1rem; align-items: baseline; }
        .custom-tooltip .ct-metric span { color: #94a3b8; font-size: 0.7rem; }
        .custom-tooltip .ct-metric strong { font-weight: 600; font-size: 0.8rem; }
        /* Footer */
        footer { font-size: 0.7rem; color: #64748b; text-align: center; padding-top: 1.25rem; border-top: 1px solid rgba(255,255,255,0.06); }
        footer p { margin-bottom: 0.4rem; }
        footer a { color: #818cf8; text-decoration: none; }
        footer a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
</body>
</html>
